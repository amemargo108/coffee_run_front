<body class="dark-green min-h-screen flex items-center justify-center p-4">
  <div class="mid-green rounded-2xl shadow-xl w-full max-w-3xl flex flex-col md:flex-row items-center gap-8 p-10">

    <div class="flex-1 text-left">
      <h1 class="text-4xl font-bold text-red-900 mb-2 barrio-regular">COFFEERUN</h1>
      <p class="text-red-900 mb-6 chela">A coffee order management platform for MiniPork Inc.</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-3 mb-4">
        <div class="flex items-center gap-3">
          <label for="email" class="text-red-900 chela w-20 text-right">email:</label>
          <input id="email" formControlName="email" type="email"
            class="flex-1 bg-orange-100 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-800">
        </div>
        <div class="flex items-center gap-3">
          <label for="password" class="text-red-900 chela w-20 text-right">password:</label>
          <input id="password" formControlName="password" type="password"
            class="flex-1 bg-orange-100 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-red-800">
        </div>

        <p *ngIf="errorMessage" class="text-red-700 text-sm">{{ errorMessage }}</p>
      </form>

      <button
        (click)="onSubmit()"
        [disabled]="isLoading"
        class="bg-red-900 hover:bg-red-800 text-orange-100 font-semibold py-2 px-6 rounded-lg transition duration-200">
        {{ isLoading ? 'Logging in...' : 'Submit' }}
      </button>
    </div>

    <div class="flex-1 flex items-center justify-center">
      <img src="images/beans.png" alt="Coffee beans" class="w-40 h-auto">
    </div>
  </div>
</body>
