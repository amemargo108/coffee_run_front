
<body class="dark-greem min-h-screen flex items-center justify-center p-4">

  <div class="mid-green rounded-2xl shadow-xl w-full max-w-3xl flex flex-col md:flex-row items-center gap-8 p-10">

    <!-- Left column: branding + form -->
    <div class="flex-1 text-left">
      <h1 class="text-4xl font-bold text-red-900 mb-2 barrio-regular">

      </p>

      <form class="space-y-3 mb-4">

        </div>
        <div class="flex items-center gap-3">

        </div>
      </form>

      <button class="bg-red-900 hover:bg-red-800 text-orange-100 font-semibold py-2 px-6 rounded-lg transition duration-200">
        Submit
      </button>
    </div>

    <!-- Right column: graphic -->
    <div class="flex-1 flex items-center justify-center">
      <!-- your coffee bean graphic goes here -->
      <img src="your-coffee-graphic.svg" alt="Coffee beans" class="w-40 h-auto">
